<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="bg">
        <img src="./assets/regis_bg.jpg" alt="">
    </div>

    <div class="register-container">
        <div class="register">
            <form action="POST">
                <img class="logo" src="/assets/Logo.svg" alt="">
                <h2>Daftar</h2>
                <p class="subheading">Buat akun baru untuk memulai!</p>

                <div class="input">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username">

                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan kata sandi">

                    <label for="confirm-password">Konfirmasi Kata Sandi</label>
                    <input type="password" id="confirm-password" name="confirm-password"
                        placeholder="Konfirmasi kata sandi">
                </div>

                <div class="option">
                    <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
                </div>

                <button class="daftar" type="submit">Daftar</button>

                <p class="atau">Atau</p>

                <a class="google" href="#">
                    <img src="/assets/google-logo.png" alt="google">
                    <div>Daftar dengan Google</div>
                </a>
            </form>
        </div>
    </div>

</body>

</html>
